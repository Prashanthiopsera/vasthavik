name: CI/CD — vasthavik

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: us-west-2
  ECR_BACKEND: vasthavik-backend
  ECR_FRONTEND: vasthavik-frontend
  ENVIRONMENT: dev
  NAMESPACE: vasthavik-dev

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Build & push backend image to ECR
  # ──────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend (Flask)
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_BACKEND --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository --repository-name $ECR_BACKEND --region $AWS_REGION \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          IMAGE="${REGISTRY}/${ECR_BACKEND}:${TAG}"
          docker build -t "${IMAGE}" -f backend/dockerfile ./backend
          docker push "${IMAGE}"
          docker tag "${IMAGE}" "${REGISTRY}/${ECR_BACKEND}:latest"
          docker push "${REGISTRY}/${ECR_BACKEND}:latest"
          echo "Pushed: ${IMAGE}"

  # ──────────────────────────────────────────────────────────────
  # Job 2: Build & push frontend image to ECR
  # ──────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_FRONTEND --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository --repository-name $ECR_FRONTEND --region $AWS_REGION \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.meta.outputs.tag }}
          REACT_APP_API_URL: http://vasthavik-backend:5001
          REACT_APP_CONTRACT_ADDRESS: ${{ vars.REACT_APP_CONTRACT_ADDRESS }}
        run: |
          IMAGE="${REGISTRY}/${ECR_FRONTEND}:${TAG}"
          docker build \
            --build-arg REACT_APP_API_URL="${REACT_APP_API_URL}" \
            --build-arg REACT_APP_CONTRACT_ADDRESS="${REACT_APP_CONTRACT_ADDRESS}" \
            -t "${IMAGE}" -f frontend/dockerfile ./frontend
          docker push "${IMAGE}"
          docker tag "${IMAGE}" "${REGISTRY}/${ECR_FRONTEND}:latest"
          docker push "${REGISTRY}/${ECR_FRONTEND}:latest"

  # ──────────────────────────────────────────────────────────────
  # Job 3: Update Kustomize image tags → triggers ArgoCD sync
  # ──────────────────────────────────────────────────────────────
  update-manifests:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kustomize
        run: |
          curl -sL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz | tar xz
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags in dev overlay
        env:
          BACKEND_TAG: ${{ needs.build-backend.outputs.image_tag }}
          FRONTEND_TAG: ${{ needs.build-frontend.outputs.image_tag }}
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        run: |
          cd k8s/overlays/dev
          kustomize edit set image \
            vasthavik-backend="${REGISTRY}/vasthavik-backend:${BACKEND_TAG}" \
            vasthavik-frontend="${REGISTRY}/vasthavik-frontend:${FRONTEND_TAG}"
          echo "Updated kustomization.yaml:"
          cat kustomization.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git diff --cached --quiet && echo "No image tag changes" && exit 0
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add k8s/overlays/dev/kustomization.yaml
          git commit -m "ci: update dev image tags [${GITHUB_SHA:0:7}] [skip ci]"
          git push origin main

  # ──────────────────────────────────────────────────────────────
  # Job 4: Verify deployment via ArgoCD
  # ──────────────────────────────────────────────────────────────
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [update-manifests]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name vasthavik-dev-cluster

      - name: Wait for ArgoCD sync
        run: |
          echo "Waiting for ArgoCD to sync vasthavik-dev..."
          # Give ArgoCD up to 3 minutes to detect and sync
          for i in $(seq 1 18); do
            STATUS=$(kubectl get application vasthavik-dev \
              -n argocd \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "unknown")
            HEALTH=$(kubectl get application vasthavik-dev \
              -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "unknown")
            echo "[$i/18] Sync: ${STATUS} | Health: ${HEALTH}"
            if [ "$STATUS" = "Synced" ] && [ "$HEALTH" = "Healthy" ]; then
              echo "✅ Deployment synced and healthy"
              break
            fi
            sleep 10
          done

      - name: Check pod status
        run: |
          kubectl get pods -n $NAMESPACE
          kubectl rollout status deployment/vasthavik-backend -n $NAMESPACE --timeout=120s
          kubectl rollout status deployment/vasthavik-frontend -n $NAMESPACE --timeout=120s

      - name: Print deployment summary
        run: |
          echo ""
          echo "═══════════════════════════════════════════"
          echo "  vasthavik deployed to AWS EKS (dev)"
          echo "  Region: us-west-2"
          echo "  Namespace: vasthavik-dev"
          echo "═══════════════════════════════════════════"
          kubectl get svc -n $NAMESPACE

# Secrets are managed via AWS Secrets Manager + External Secrets Operator in production.
# For initial dev bootstrap, apply this manually:
#
#   kubectl create secret generic vasthavik-backend-secret \
#     --namespace=vasthavik-dev \
#     --from-literal=secret-key="<64-char-hex-secret>" \
#     --from-literal=database-url="postgresql://user:pass@rds-endpoint:5432/vasthavik" \
#     --from-literal=db-pass="<postgres-password>"
#
# Then delete this placeholder file from your cluster (it is NOT applied by ArgoCD).
# The secret above must exist before deploying the backend.
#
# See DEPLOYMENT-CONTEXT.md for the full list of required GitHub secrets.

name: CI — vasthavik

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────
  # Build backend Docker image
  # ──────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend (Flask)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build -t vasthavik-backend:${{ github.sha }} \
            -f backend/dockerfile ./backend
          echo "✅ Backend image built: vasthavik-backend:${{ github.sha }}"

  # ──────────────────────────────────────────────────────────────
  # Build frontend Docker image
  # ──────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: |
          docker build -t vasthavik-frontend:${{ github.sha }} \
            -f frontend/dockerfile ./frontend
          echo "✅ Frontend image built: vasthavik-frontend:${{ github.sha }}"

  # ──────────────────────────────────────────────────────────────
  # Lint backend Python code
  # ──────────────────────────────────────────────────────────────
  lint-backend:
    name: Lint Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 backend/ \
            --max-line-length=120 \
            --exclude=backend/__pycache__ \
            --count --statistics
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # Lint frontend (npm)
  # ──────────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run lint
        run: npm run lint --if-present
        working-directory: frontend
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # Summary job — required to pass before merge
  # ──────────────────────────────────────────────────────────────
  ci-success:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, lint-backend, lint-frontend]
    steps:
      - name: All checks passed
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  vasthavik CI — all checks passed ✅  ║"
          echo "╚══════════════════════════════════════╝"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
